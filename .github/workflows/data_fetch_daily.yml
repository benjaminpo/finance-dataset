name: Fetch Daily Bars

on:
  # After major market closes.
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Serialize Kaggle pull/publish with the intraday workflow.
concurrency:
  group: finance-dataset-kaggle
  cancel-in-progress: false

jobs:
  fetch-daily:
    runs-on: ubuntu-latest
    # Full listing universe × 1d + 1wk.
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest Kaggle dataset
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_DATASET_HANDLE: benjaminpo/finance-dataset
        run: python scripts/pull_kaggle.py --optional

      - name: Fetch daily + weekly bars (full universe)
        run: >
          python src/main.py
          --config config/tickers.yaml
          --intervals 1d 1wk
          --workers 8
          --sleep 0.25
          --summary-path artifacts/fetch-summary.json

      - name: Upload fetch summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-summary-daily
          path: |
            artifacts/fetch-summary.json
            artifacts/fetch-summary.md
          if-no-files-found: warn

      - name: Publish OHLCV to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_DATASET_HANDLE: benjaminpo/finance-dataset
        run: >
          python scripts/publish_kaggle.py
          --version-notes "Daily bars refresh (1d + 1wk, full universe)"

      - name: Commit listing updates
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: python scripts/batch_commit.py --batch-size 100
