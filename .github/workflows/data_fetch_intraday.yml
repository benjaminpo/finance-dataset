name: Fetch Intraday Bars

on:
  # US cash session roughly 14:30–21:00 UTC; grab a few windows on weekdays.
  schedule:
    - cron: "15 15,18,21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

# Serialize Kaggle pull/publish with the daily workflow and across shards.
concurrency:
  group: finance-dataset-kaggle
  cancel-in-progress: false

jobs:
  fetch-intraday:
    runs-on: ubuntu-latest
    # Full listings × intraday, one shard at a time (+ Kaggle Ready wait).
    timeout-minutes: 360
    strategy:
      fail-fast: false
      # One shard at a time: each job pulls/publishes the full Kaggle tree.
      max-parallel: 1
      matrix:
        include:
          # NASDAQ+S&P is large — split into 6 symbol shards.
          - id: us-0
            asset_classes: stocks_us
            shard_index: 0
            shard_count: 6
          - id: us-1
            asset_classes: stocks_us
            shard_index: 1
            shard_count: 6
          - id: us-2
            asset_classes: stocks_us
            shard_index: 2
            shard_count: 6
          - id: us-3
            asset_classes: stocks_us
            shard_index: 3
            shard_count: 6
          - id: us-4
            asset_classes: stocks_us
            shard_index: 4
            shard_count: 6
          - id: us-5
            asset_classes: stocks_us
            shard_index: 5
            shard_count: 6
          - id: kr-0
            asset_classes: stocks_kr
            shard_index: 0
            shard_count: 3
          - id: kr-1
            asset_classes: stocks_kr
            shard_index: 1
            shard_count: 3
          - id: kr-2
            asset_classes: stocks_kr
            shard_index: 2
            shard_count: 3
          - id: jp-0
            asset_classes: stocks_jp
            shard_index: 0
            shard_count: 4
          - id: jp-1
            asset_classes: stocks_jp
            shard_index: 1
            shard_count: 4
          - id: jp-2
            asset_classes: stocks_jp
            shard_index: 2
            shard_count: 4
          - id: jp-3
            asset_classes: stocks_jp
            shard_index: 3
            shard_count: 4
          - id: eu
            asset_classes: stocks_eu
            shard_index: 0
            shard_count: 1
          - id: liquid
            asset_classes: stocks_hk crypto indices futures fx
            shard_index: 0
            shard_count: 1

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest Kaggle dataset
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_DATASET_HANDLE: benjaminpo/finance-dataset
        run: python scripts/pull_kaggle.py --optional

      - name: Fetch intraday bars (${{ matrix.id }})
        run: >
          python src/main.py
          --config config/tickers_intraday.yaml
          --intervals 1m 2m 5m 15m 30m 60m 90m 1h
          --asset-classes ${{ matrix.asset_classes }}
          --shard-index ${{ matrix.shard_index }}
          --shard-count ${{ matrix.shard_count }}
          --workers 8
          --sleep 0.25
          --summary-path artifacts/fetch-summary.json

      - name: Upload fetch summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-summary-intraday-${{ matrix.id }}
          path: |
            artifacts/fetch-summary.json
            artifacts/fetch-summary.md
          if-no-files-found: warn

      - name: Publish OHLCV to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_DATASET_HANDLE: benjaminpo/finance-dataset
        run: >
          python scripts/publish_kaggle.py
          --version-notes "Intraday refresh (1m–1h, shard ${{ matrix.id }})"
          --require-intervals 1d 1wk 1m 2m 5m 15m 30m 60m 90m 1h

      - name: Commit listing updates
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: python scripts/batch_commit.py --batch-size 100
