name: Fetch Financial Data

on:
  # Daily run at 23:00 UTC — after major market closes.
  schedule:
    - cron: "0 23 * * *"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    # Full NASDAQ + S&P 500 universe is large; allow a long first/daily run.
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline
        # Refreshes listing CSVs when remotes changed, then fetches with
        # parallel workers. Use --skip-existing on manual re-runs to resume.
        run: python src/main.py --workers 8 --sleep 0.25

      - name: Publish OHLCV to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_DATASET_HANDLE: benjaminpo/finance-dataset
        run: python scripts/publish_kaggle.py

      - name: Commit listing updates
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: python scripts/batch_commit.py --batch-size 100
