# Ticker configuration for the Yahoo Finance data pipeline.
# Add or remove symbols under each asset class as needed.
# Yahoo Finance suffixes:
#   .L  = London Stock Exchange
#   .PA = Euronext Paris
#   .DE = XETRA (Germany)
#   .F  = Frankfurt
#   .AS = Euronext Amsterdam
#   .BR = Euronext Brussels
#   .MI = Borsa Italiana
#   .MC = Bolsa de Madrid
#   .SW = SIX Swiss Exchange
#   .ST = Nasdaq Stockholm
#   .HE = Nasdaq Helsinki
#   .HK = Hong Kong Stock Exchange
#   .T  = Tokyo Stock Exchange
#   .KS = Korea Exchange (KOSPI)
#   .KQ = Korea Exchange (KOSDAQ)
#   =F  = Futures
#   =X  = Forex
#   -USD = Crypto quoted in USD
#
# `listings` maps an asset class to CSV entries. Each entry has a local
# `path` (relative to this config directory) plus either a remote `url`
# or a `source` (e.g. krx, tse, europe) used to refresh the file on each run.
# Symbol columns are unioned into that class. US share-class dots are
# converted for Yahoo (BRK.B → BRK-B); NASDAQ Test Issue = Y rows are skipped.

listings:
  stocks_us:
    - path: listings/nasdaq-listed-symbols.csv
      url: https://raw.githubusercontent.com/datasets/nasdaq-listings/master/data/nasdaq-listed-symbols.csv
    - path: listings/sp500-constituents.csv
      url: https://raw.githubusercontent.com/datasets/s-and-p-500-companies/master/data/constituents.csv
  stocks_kr:
    - path: listings/krx-listed-symbols.csv
      source: krx   # rebuild from KOSPI + KOSDAQ via FinanceDataReader
  stocks_jp:
    - path: listings/tse-listed-symbols.csv
      source: tse   # rebuild from Tokyo Stock Exchange via FinanceDataReader
  stocks_eu:
    - path: listings/europe-listed-symbols.csv
      source: europe  # STOXX 50, DAX, CAC, FTSE 100, AEX, IBEX, …

# Optional extra tickers beyond the listing CSVs (usually empty).
stocks_us: []
stocks_kr: []
stocks_jp: []
stocks_eu: []

stocks_hk:
  - "0700.HK"   # Tencent
  - "9988.HK"   # Alibaba
  - "0005.HK"   # HSBC
  - "0941.HK"   # China Mobile
  - "1299.HK"   # AIA
  - "2318.HK"   # Ping An
  - "1398.HK"   # ICBC
  - "0388.HK"   # HKEX
  - "1810.HK"   # Xiaomi
  - "3690.HK"   # Meituan

indices:
