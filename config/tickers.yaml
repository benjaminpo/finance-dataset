  - "^GSPC"       # S&P 500
  - "^DJI"        # Dow Jones
  - "^IXIC"       # Nasdaq Composite
  - "^RUI"        # Russell 1000
  - "^RUT"        # Russell 2000
  - "^RUA"        # Russell 3000
  - "^VIX"        # CBOE Volatility Index
  # Europe
  - "^FTSE"       # FTSE 100
  - "^GDAXI"      # DAX
  - "^FCHI"       # CAC 40
  - "^STOXX50E"   # EURO STOXX 50
  - "^STOXX"      # STOXX Europe 600
  - "^AEX"        # AEX (Netherlands)
  - "^BFX"        # BEL 20 (Belgium)
  - "^IBEX"       # IBEX 35 (Spain)
  - "^FTSEMIB"    # FTSE MIB (Italy)
  - "^SSMI"       # Swiss Market Index
  - "^OMXS30"     # OMX Stockholm 30
  - "^OMXH25"     # OMX Helsinki 25
  # Asia
  - "^HSI"        # Hang Seng
  - "^N225"       # Nikkei 225
  - "^KS11"       # KOSPI Composite Index
  - "^KQ11"       # KOSDAQ Composite Index
  - "^KS200"      # KOSPI 200 Index

rates:
  - "^IRX"        # 13-Week Treasury Bill yield
  - "^FVX"        # 5-Year Treasury yield
  - "^TNX"        # 10-Year Treasury yield
  - "^TYX"        # 30-Year Treasury yield

futures:
  - CL=F        # Crude Oil WTI
  - GC=F        # Gold
  - SI=F        # Silver
  - ES=F        # E-mini S&P 500
  - NQ=F        # E-mini Nasdaq-100
  - ZN=F        # 10-Year T-Note
  - NG=F        # Natural Gas
  - HG=F        # Copper

